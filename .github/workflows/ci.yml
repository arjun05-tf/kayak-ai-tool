name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . --select E,W,F --ignore E501

      - name: Run tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t kayakflow:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d -p 8000:8000 -e GROQ_API_KEY=dummy --name smoke kayakflow:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || (docker logs smoke && exit 1)
          docker stop smoke
